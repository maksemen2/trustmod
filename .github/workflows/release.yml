name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.23"
      - name: Build binaries
        run: |
          set -euo pipefail
          mkdir -p dist
          for target in linux/amd64 linux/arm64 darwin/amd64 darwin/arm64 windows/amd64; do
            os="${target%/*}"
            arch="${target#*/}"
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            GOOS="$os" GOARCH="$arch" go build -ldflags "-s -w -X main.version=${GITHUB_REF_NAME} -X main.commit=${GITHUB_SHA} -X main.date=$(date -u +%Y-%m-%dT%H:%M:%SZ)" -o "dist/trustmod_${os}_${arch}${ext}" ./cmd/trustmod
          done
          (cd dist && sha256sum * > checksums.txt)
      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
